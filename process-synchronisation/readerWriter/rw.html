<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reader-Writer Problem</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      min-height: 100%;
      font-family: 'Poppins', sans-serif;
      background: url('../background.jpg') no-repeat center center fixed;
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .box {
      background-color: rgba(255, 255, 255, 0.9);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      max-width: 800px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-weight: 700;
      margin-bottom: 20px;
      color: #2c3e50;
    }

    #reader-count {
      font-size: 20px;
      margin-bottom: 25px;
    }

    button {
      margin: 10px 10px 20px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    #read-btn, #write-btn {
      background-color: #e3e3ff;
      color: #000;
    }

    #reset-btn {
      background-color: #ffdddd;
      color: #000;
    }

    button:hover {
      opacity: 0.9;
    }

    #output {
      margin-top: 30px;
      background-color: rgba(255, 255, 255, 0.85);
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 15px 20px;
      max-width: 90%;
      text-align: left;
      margin-left: auto;
      margin-right: auto;
      font-size: 15px;
      font-family: 'Courier New', monospace;
      min-height: 100px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    #mutex-status {
      font-size: 18px;
      margin-top: 20px;
      color: #2c3e50;
      font-weight: bold;
    }

    .warning {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Reader-Writer Problem</h1>
    <div id="reader-count">Readers: 0</div>
    <button id="read-btn" onclick="startReading()">Start Reading</button>
    <button id="write-btn" onclick="startWriting()">Start Writing</button>
    <button id="reset-btn" onclick="reset()">Reset</button>
    <div id="output"></div>
    <div id="mutex-status">Mutex: Unlocked</div>
  </div>

  <script>
    let readers = 0;
    let writers = 0;
    let writing = false;
    let timeouts = [];

    function startReading() {
      if (writers > 0 || writing) {
        showWarning("Cannot read. Writer is active.");
      } else {
        readers++;
        updateReaderCount();
        const statusElement = document.getElementById("mutex-status");
        statusElement.innerHTML = "Mutex: Locked";
        statusElement.style.color = "red";
        read();
      }
    }

    function startWriting() {
      if (readers > 0) {
        showWarning(`Cannot write. ${readers} reader(s) are currently active.`);
      } else if (writing || writers > 0) {
        showWarning("Cannot write. Another writer is currently active.");
      } else {
        writers++;
        const statusElement = document.getElementById("mutex-status");
        statusElement.innerHTML = "Mutex: Locked";
        statusElement.style.color = "red";
        write();
      }
    }

    function read() {
      if (writing || writers > 0) {
        const retryTimeout = setTimeout(read, 1000);
        timeouts.push(retryTimeout);
      } else {
        const output = document.getElementById("output");
        output.innerHTML += "Reader is reading...<br>";
        const timeout = setTimeout(function () {
          output.innerHTML += "Reader finished reading.<br>";
          readers--;
          updateReaderCount();
          updateReadersMutex();
        }, 2000);
        timeouts.push(timeout);
      }
    }

    function write() {
      if (writing || readers > 0 || writers > 1) {
        const retryTimeout = setTimeout(write, 1000);
        timeouts.push(retryTimeout);
      } else {
        writing = true;
        const output = document.getElementById("output");
        output.innerHTML += "Writer is writing...<br>";
        const timeout = setTimeout(function () {
          output.innerHTML += "Writer finished writing.<br>";
          writing = false;
          writers--;
          updateWritersMutex();
        }, 3000);
        timeouts.push(timeout);
      }
    }

    function updateReaderCount() {
      document.getElementById("reader-count").innerHTML = `Readers: ${readers}`;
    }

    function updateWritersMutex()
    {
      if(writers == 0)
      {
        const statusElement = document.getElementById("mutex-status");
        statusElement.innerHTML = "Mutex: Unlocked";
        statusElement.style.color = "green";
      }
    }

    function updateReadersMutex()
    {
      if(readers == 0)
      {
        const statusElement = document.getElementById("mutex-status");
        statusElement.innerHTML = "Mutex: Unlocked";
        statusElement.style.color = "green";
      }
    }

    function showWarning(message) {
      const output = document.getElementById("output");
      output.innerHTML += `<span class="warning">${message}</span><br>`;
    }

    function reset() {
      // Cancel all pending timeouts
      timeouts.forEach(clearTimeout);
      timeouts = [];

      // Clear state and UI
      readers = 0;
      writers = 0;
      writing = false;
      document.getElementById("output").innerHTML = "";
      updateReaderCount();

      const statusElement = document.getElementById("mutex-status");
      statusElement.innerHTML = "Mutex: Unlocked";
      statusElement.style.color = "green";
    }
  </script>
</body>
</html>
