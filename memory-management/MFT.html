<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>MFT Simulation - OS Visualizer</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, rgba(173, 150, 220, 0.9), rgba(75, 192, 192, 0.9));
            background-size: cover;
            background-attachment: fixed;
            color: #ffffff;
            position: relative;
            overflow-x: hidden;
            line-height: 1.6;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><defs><pattern id="dots" patternUnits="userSpaceOnUse" width="30" height="30"><circle cx="5" cy="5" r="1.5" fill="rgba(255, 255, 255, 0.2)"/></pattern></defs><rect width="100%" height="100%" fill="url(%23dots)"/></svg>');
            pointer-events: none;
            z-index: -1;
        }
        
        nav {
            background-color: rgba(98, 0, 234, 0.95);
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 0 5%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            transition: all 0.3s ease;
            padding: 10px 20px;
            border-radius: 8px;
            letter-spacing: 1px;
        }
        
        .logo:hover {
            background-color: rgba(133, 2, 247, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        ul {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }
        
        li {
            margin: 0 5px;
        }
        
        a {
            color: #ffffff;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        a:hover {
            background-color: rgba(133, 2, 247, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 20px 60px;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: #6200ea;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            text-align: center;
            background-color: rgba(15, 15, 15, 0.8);
            padding: 25px;
            border-radius: 15px;
        }
        
        .simulation-area {
            background-color: rgba(15, 15, 15, 0.8);
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #d1c4e9;
        }
        
        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: none;
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            color: #333;
            transition: all 0.3s ease;
        }
        
        input[type="number"]:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(98, 0, 234, 0.5);
        }
        
        .button {
            display: inline-block;
            padding: 12px 28px;
            background-color: #6200ea;
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            margin-bottom: 30px;
        }
        
        .button1:hover {
            background-color: #8502f7;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .memory-block {
            display: inline-block;
            background-color: rgba(209, 196, 233, 0.7);
            margin: 5px;
            text-align: center;
            line-height: 50px;
            font-weight: bold;
            color: #000;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        
        .allocated {
            background-color: rgba(98, 0, 234, 0.7);
            color: #fff;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(98, 0, 234, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(98, 0, 234, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(98, 0, 234, 0);
            }
        }
        
        #memory-container {
            margin: 30px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        
        #allocation-log {
            margin-top: 30px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        #allocation-log p {
            margin: 5px 0;
            color: #d1c4e9;
        }
        
        .section-title {
            margin: 30px 0 15px;
            font-size: 1.5rem;
            color: #6200ea;
            border-bottom: 2px solid rgba(98, 0, 234, 0.5);
            padding-bottom: 10px;
        }
        
        .floating-shape {
            position: absolute;
            opacity: 0.4;
            z-index: -1;
        }
        
        .shape1 {
            top: 15%;
            left: 10%;
            width: 150px;
            height: 150px;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            background-color: rgba(133, 2, 247, 0.6);
            animation: float 12s ease-in-out infinite;
        }
        
        .shape2 {
            bottom: 20%;
            right: 15%;
            width: 180px;
            height: 180px;
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            background-color: rgba(75, 192, 192, 0.6);
            animation: float 15s ease-in-out infinite;
        }
        
        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(10deg);
            }
            100% {
                transform: translateY(0) rotate(0deg);
            }
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .simulation-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="floating-shape shape1"></div>
    <div class="floating-shape shape2"></div>

    <nav>
        <a class="logo" href="../index.html">OS VISUALIZER</a>
        <ul>
            <li><a class="button button1" href="#">Home</a></li>
            <li><a class="button button1" href="about.html">About</a></li>
            <li><a class="button button1" href="#">References</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Memory Management - MFT (Multiple Fixed-size Tasks)</h1>
        
        <div class="simulation-area">
            <div class="input-section">
                <label for="total-memory-size">Enter the total size of memory:</label>
                <input type="number" id="total-memory-size" min="1">
                
                <label for="partitions">Enter the number of partitions:</label>
                <input type="number" id="partitions" min="1">
                
                <button onclick="initializeMemory()" class="button button1 dropbtn">Initialize Memory</button>
            </div>
            
            <div id="memory-container"></div>
            
            <p class="section-title">Process Allocation:</p>
            
            <div class="input-section">
                <label for="process-size">Enter the size of the process:</label>
                <input type="number" id="process-size" min="1">
                
                <button onclick="allocateProcess()" class="button button1 dropbtn">Allocate Process</button>
            </div>
            
            <div id="allocation-log"></div>
        </div>
    </div>

    <script>
        var totalMemorySize = 0;
        var memoryBlocks = [];

        function initializeMemory() {
            totalMemorySize = parseInt(document.getElementById("total-memory-size").value);
            nop = parseInt(document.getElementById("partitions").value);
            
            if (isNaN(totalMemorySize) || isNaN(nop) || totalMemorySize <= 0 || nop <= 0) {
                alert("Please enter valid numbers for memory size and partitions.");
                return;
            }
            
            var memoryContainer = document.getElementById("memory-container");
            memoryContainer.innerHTML = "";
            memoryBlocks = [];

            var blockSize = Math.floor(totalMemorySize / nop);
            for (var i = 0; i < nop; i++) {
                var memoryBlock = document.createElement("div");
                memoryBlock.className = "memory-block";
                memoryBlock.style.width = Math.min(200, blockSize * 2) + "px"; // Scale for visibility
                memoryBlock.style.height = "50px";
                memoryBlock.innerHTML = blockSize;
                memoryBlock.dataset.allocated = "false";
                memoryBlock.dataset.originalSize = blockSize;

                memoryContainer.appendChild(memoryBlock);
                memoryBlocks.push(memoryBlock);
            }
            
            document.getElementById("allocation-log").innerHTML = 
                "<p>Memory initialized with " + nop + " partitions of size " + blockSize + " each.</p>";
        }

        function allocateProcess() {
            var processSize = parseInt(document.getElementById("process-size").value);
            var allocationLog = document.getElementById("allocation-log");
            
            if (isNaN(processSize) || processSize <= 0) {
                alert("Please enter a valid process size.");
                return;
            }
            
            if (memoryBlocks.length === 0) {
                allocationLog.innerHTML += "<p>Please initialize memory first.</p>";
                return;
            }
            
            var allocated = false;

            for (var i = 0; i < memoryBlocks.length; i++) {
                if (memoryBlocks[i].dataset.allocated === "false" && 
                    parseInt(memoryBlocks[i].dataset.originalSize) >= processSize) {
                    
                    memoryBlocks[i].innerHTML = processSize;
                    memoryBlocks[i].classList.add("allocated");
                    memoryBlocks[i].dataset.allocated = "true";
                    
                    allocated = true;
                    allocationLog.innerHTML += 
                        "<p>Process of size " + processSize + " allocated to block " + (i + 1) + 
                        " (Internal fragmentation: " + 
                        (parseInt(memoryBlocks[i].dataset.originalSize) - processSize) + ")</p>";
                    break;
                }
            }

            if (!allocated) {
                allocationLog.innerHTML += 
                    "<p>No available block found to allocate process of size " + processSize + "</p>";
            }
            
            // Auto-scroll the log to the bottom
            allocationLog.scrollTop = allocationLog.scrollHeight;
        }
    </script>
</body>
</html>
