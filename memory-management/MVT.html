<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>MVT Simulation - OS Visualizer</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, rgba(173, 150, 220, 0.9), rgba(75, 192, 192, 0.9));
            background-size: cover;
            background-attachment: fixed;
            color: #ffffff;
            position: relative;
            overflow-x: hidden;
            line-height: 1.6;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><defs><pattern id="dots" patternUnits="userSpaceOnUse" width="30" height="30"><circle cx="5" cy="5" r="1.5" fill="rgba(255, 255, 255, 0.2)"/></pattern></defs><rect width="100%" height="100%" fill="url(%23dots)"/></svg>');
            pointer-events: none;
            z-index: -1;
        }
        
        nav {
            background-color: rgba(98, 0, 234, 0.95);
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 0 5%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            transition: all 0.3s ease;
            padding: 10px 20px;
            border-radius: 8px;
            letter-spacing: 1px;
        }
        
        .logo:hover {
            background-color: rgba(133, 2, 247, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        ul {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }
        
        li {
            margin: 0 5px;
        }
        
        a {
            color: #ffffff;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        a:hover {
            background-color: rgba(133, 2, 247, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 20px 60px;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: #6200ea;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            text-align: center;
            background-color: rgba(15, 15, 15, 0.8);
            padding: 25px;
            border-radius: 15px;
        }
        
        .simulation-area {
            background-color: rgba(15, 15, 15, 0.8);
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }
        
        label {
            display: block;
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: #d1c4e9;
        }
        
        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: none;
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            color: #333;
            transition: all 0.3s ease;
        }
        
        input[type="number"]:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(98, 0, 234, 0.5);
        }
        
        .button {
            display: inline-block;
            padding: 12px 28px;
            background-color: #6200ea;
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            cursor: pointer;
            margin-bottom: 30px;
        }
        
        .button1:hover {
            background-color: #8502f7;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .block {
            display: inline-block;
            background-color: rgba(209, 196, 233, 0.7);
            margin: 5px;
            text-align: center;
            line-height: 50px;
            font-weight: bold;
            color: #000;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            height: 50px;
            position: relative;
        }
        
        .block::after {
            content: attr(data-process-id);
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: #ffffff;
        }
        
        .allocated {
            background-color: rgba(98, 0, 234, 0.7);
            color: #fff;
            animation: pulse 2s infinite;
        }
        
        /* Different colors for different processes */
        .process-color-1 { background-color: rgba(98, 0, 234, 0.7); }
        .process-color-2 { background-color: rgba(233, 30, 99, 0.7); }
        .process-color-3 { background-color: rgba(0, 150, 136, 0.7); }
        .process-color-4 { background-color: rgba(255, 87, 34, 0.7); }
        .process-color-5 { background-color: rgba(63, 81, 181, 0.7); }
        
        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(98, 0, 234, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(98, 0, 234, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(98, 0, 234, 0);
            }
        }
        
        #block-container {
            margin: 30px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            min-height: 80px;
            padding-bottom: 20px; /* Space for process IDs */
        }
        
        #allocation-log {
            margin-top: 30px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        #allocation-log p {
            margin: 5px 0;
            color: #d1c4e9;
        }
        
        .section-title {
            margin: 30px 0 15px;
            font-size: 1.5rem;
            color: #6200ea;
            border-bottom: 2px solid rgba(98, 0, 234, 0.5);
            padding-bottom: 10px;
        }
        
        .memory-status {
            margin-top: 20px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
        }
        
        .memory-status p {
            margin: 5px 0;
            color: #d1c4e9;
        }
        
        .floating-shape {
            position: absolute;
            opacity: 0.4;
            z-index: -1;
        }
        
        .shape1 {
            top: 15%;
            left: 10%;
            width: 150px;
            height: 150px;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            background-color: rgba(133, 2, 247, 0.6);
            animation: float 12s ease-in-out infinite;
        }
        
        .shape2 {
            bottom: 20%;
            right: 15%;
            width: 180px;
            height: 180px;
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            background-color: rgba(75, 192, 192, 0.6);
            animation: float 15s ease-in-out infinite;
        }
        
        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(10deg);
            }
            100% {
                transform: translateY(0) rotate(0deg);
            }
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .simulation-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="floating-shape shape1"></div>
    <div class="floating-shape shape2"></div>

    <nav>
        <a class="logo" href="../index.html">OS VISUALIZER</a>
        <ul>
            <li><a class="button button1" href="#">Home</a></li>
            <li><a class="button button1" href="about.html">About</a></li>
            <li><a class="button button1" href="#">References</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Memory Management - MVT (Multiple Variable-size Tasks)</h1>
        
        <div class="simulation-area">
            <div class="input-section">
                <label for="block-size">Enter the total size of memory:</label>
                <input type="number" id="block-size" min="1">
                
                <button onclick="createBlock()" class="button button1 dropbtn">Initialize Memory</button>
            </div>
            
            <div id="block-container"></div>
            
            <div class="memory-status" id="memory-status">
                <p>Memory not initialized</p>
            </div>
            
            <p class="section-title">Process Allocation:</p>
            
            <div class="input-section">
                <label for="process-size">Enter the size of the process:</label>
                <input type="number" id="process-size" min="1">
                
                <button onclick="allocateProcess()" class="button button1 dropbtn">Allocate Process</button>
            </div>
            
            <div id="allocation-log"></div>
        </div>
    </div>

    <script>
        var memoryBlocks = [];
        var totalMemory = 0;
        var allocatedMemory = 0;
        var processCounter = 0;
        var allocatedBlocks = [];

        function createBlock() {
            var size = parseInt(document.getElementById("block-size").value);
            
            if (isNaN(size) || size <= 0) {
                alert("Please enter a valid memory size.");
                return;
            }
            
            var blockContainer = document.getElementById("block-container");
            blockContainer.innerHTML = ""; // Clear existing blocks
            
            // Reset all variables
            memoryBlocks = [];
            allocatedBlocks = [];
            totalMemory = size;
            allocatedMemory = 0;
            processCounter = 0;
            
            var block = document.createElement("div");
            block.className = "block";
            // Scale for visibility but cap at reasonable size
            var displayWidth = Math.min(800, Math.max(100, size / 2));
            block.style.width = displayWidth + "px";
            block.style.height = "50px";
            block.innerHTML = size;
            
            blockContainer.appendChild(block);
            memoryBlocks.push({ 
                size: size, 
                element: block,
                id: "free-space"
            });
            
            updateMemoryStatus();
            
            document.getElementById("allocation-log").innerHTML = 
                "<p>Memory initialized with size " + size + ".</p>";
        }

        function updateMemoryStatus() {
            var status = document.getElementById("memory-status");
            var freeMemory = totalMemory - allocatedMemory;
            
            status.innerHTML = 
                "<p>Total Memory: " + totalMemory + "</p>" +
                "<p>Allocated Memory: " + allocatedMemory + "</p>" +
                "<p>Free Memory: " + freeMemory + "</p>";
        }

        function allocateProcess() {
            var processSize = parseInt(document.getElementById("process-size").value);
            var allocationLog = document.getElementById("allocation-log");
            
            if (isNaN(processSize) || processSize <= 0) {
                alert("Please enter a valid process size.");
                return;
            }
            
            if (memoryBlocks.length === 0 || totalMemory === 0) {
                allocationLog.innerHTML += "<p>Please initialize memory first.</p>";
                return;
            }
            
            // Find first free block that can fit the process
            var allocatedBlockIndex = -1;
            
            for (var i = 0; i < memoryBlocks.length; i++) {
                if (memoryBlocks[i].id === "free-space" && memoryBlocks[i].size >= processSize) {
                    allocatedBlockIndex = i;
                    break;
                }
            }

            if (allocatedBlockIndex !== -1) {
                processCounter++;
                var currentBlock = memoryBlocks[allocatedBlockIndex];
                var remainingSize = currentBlock.size - processSize;
                
                // Remove current block from DOM and array
                currentBlock.element.remove();
                memoryBlocks.splice(allocatedBlockIndex, 1);
                
                // Create process block (allocated memory)
                var processBlock = document.createElement("div");
                processBlock.className = "block allocated process-color-" + (processCounter % 5 + 1);
                var displayWidth = Math.min(600, Math.max(50, processSize / 2));
                processBlock.style.width = displayWidth + "px";
                processBlock.style.height = "50px";
                processBlock.innerHTML = processSize;
                processBlock.dataset.processId = "P" + processCounter;
                
                // Add the process block to our tracking arrays
                var processObj = {
                    id: "P" + processCounter,
                    size: processSize,
                    element: processBlock
                };
                
                allocatedBlocks.push(processObj);
                memoryBlocks.splice(allocatedBlockIndex, 0, processObj);
                
                // Create remaining free space block if needed
                if (remainingSize > 0) {
                    var freeBlock = document.createElement("div");
                    freeBlock.className = "block";
                    var remainingDisplayWidth = Math.min(600, Math.max(50, remainingSize / 2));
                    freeBlock.style.width = remainingDisplayWidth + "px";
                    freeBlock.style.height = "50px";
                    freeBlock.innerHTML = remainingSize;
                    
                    var freeObj = {
                        id: "free-space",
                        size: remainingSize,
                        element: freeBlock
                    };
                    
                    memoryBlocks.splice(allocatedBlockIndex + 1, 0, freeObj);
                }
                
                // Update allocated memory amount
                allocatedMemory += processSize;
                updateMemoryStatus();
                
                // Rebuild the visual display to show all blocks in order
                var blockContainer = document.getElementById("block-container");
                blockContainer.innerHTML = "";
                
                for (var i = 0; i < memoryBlocks.length; i++) {
                    blockContainer.appendChild(memoryBlocks[i].element);
                }

                allocationLog.innerHTML += 
                    "<p>Process P" + processCounter + " of size " + processSize + 
                    " allocated. Free memory remaining: " + (totalMemory - allocatedMemory) + "</p>";
            } else {
                allocationLog.innerHTML += 
                    "<p>No available block found to allocate process of size " + processSize + "</p>";
            }
            
            // Auto-scroll the log to the bottom
            allocationLog.scrollTop = allocationLog.scrollHeight;
        }
    </script>
</body>
</html>
